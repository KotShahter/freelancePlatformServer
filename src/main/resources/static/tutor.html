<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tutoR. - Tutor Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<nav class="navbar">
    <div class="nav-brand">
        <img src="logo.png" alt="tutoR." class="logo-small">
        <span>tutoR. Tutor</span>
    </div>
    <div class="nav-user">
        <span id="userName">Tutor</span>
        <button onclick="logout()" class="btn-logout">Logout</button>
    </div>
</nav>

<div class="container">
    <div class="welcome-section">
        <h2>Available Orders</h2>
        <p>Browse and accept tutoring orders from students</p>
    </div>

    <div class="orders-grid" id="tutorOrdersGrid">
        <!-- Dynamic order cards -->
    </div>
</div>

<!-- Order Details Modal -->
<div id="orderDetailsModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal('orderDetailsModal')">&times;</span>
        <h2>Order Details</h2>
        <div id="orderDetails">
            <!-- Dynamic content -->
        </div>
        <button id="acceptOrderBtn" class="btn-primary" onclick="acceptOrder()">Accept Order</button>
    </div>
</div>

<script src="app.js"></script>
<script>
    // Check authentication on load
    checkAuth('TUTOR');
    loadTutorOrders();
</script>
</body>
</html>
